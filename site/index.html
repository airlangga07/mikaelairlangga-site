<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mikael Airlangga</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #060606;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      overflow: hidden;
    }

    /* ── Gradient orbs ──────────────────────────────────────────────────── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      will-change: transform;
    }
    .orb-1 {
      width: 640px; height: 640px;
      background: radial-gradient(circle, #1a3a6e 0%, transparent 70%);
      opacity: 0.55;
      top: -180px; left: -160px;
    }
    .orb-2 {
      width: 520px; height: 520px;
      background: radial-gradient(circle, #3d1a5e 0%, transparent 70%);
      opacity: 0.45;
      bottom: -160px; right: -120px;
    }

    /* ── Particle canvas ────────────────────────────────────────────────── */
    canvas {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }

    /* ── Content ────────────────────────────────────────────────────────── */
    main {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 0;
    }

    .line {
      opacity: 0;
      transform: translateY(22px);
      transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 1s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .line.in { opacity: 1; transform: translateY(0); }

    h1 {
      font-size: clamp(3rem, 7.5vw, 5.5rem);
      font-weight: 300;
      letter-spacing: -0.03em;
      line-height: 1.05;
      background: linear-gradient(155deg, #ffffff 25%, #505050 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.1rem;
    }

    .tagline {
      font-size: clamp(0.7rem, 1.6vw, 0.82rem);
      color: #3a3a3a;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 2.8rem;
    }

    nav {
      display: flex;
      gap: 2.5rem;
    }

    nav a {
      color: #444;
      text-decoration: none;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      position: relative;
      transition: color 0.4s ease;
    }
    nav a::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 0; right: 0;
      height: 1px;
      background: currentColor;
      transform: scaleX(0);
      transform-origin: right;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    nav a:hover { color: #aaa; }
    nav a:hover::after { transform: scaleX(1); transform-origin: left; }

    /* ── Reduced motion ─────────────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .orb, canvas { display: none; }
      .line { opacity: 1; transform: none; transition: none; }
    }
  </style>
</head>
<body>
  <div class="orb orb-1" data-depth="0.35"></div>
  <div class="orb orb-2" data-depth="0.55"></div>
  <canvas id="bg"></canvas>

  <main>
    <h1 class="line">Mikael Airlangga</h1>
    <p class="tagline line">Software Engineer</p>
    <nav class="line">
      <a href="https://github.com/airlangga07" target="_blank" rel="noopener">GitHub</a>
      <a href="mailto:mikael.airlangga@gmail.com">Email</a>
    </nav>
  </main>

  <script>
    // ── Parallax orbs ──────────────────────────────────────────────────────
    const orbs = [...document.querySelectorAll('.orb')];
    let mx = 0, my = 0, lx = 0, ly = 0;

    window.addEventListener('mousemove', e => {
      mx = (e.clientX / innerWidth  - 0.5) * 2;
      my = (e.clientY / innerHeight - 0.5) * 2;
    });

    (function orbLoop() {
      lx += (mx - lx) * 0.05;
      ly += (my - ly) * 0.05;
      orbs.forEach(o => {
        const s = parseFloat(o.dataset.depth) * 70;
        o.style.transform = `translate(${lx * s}px, ${ly * s}px)`;
      });
      requestAnimationFrame(orbLoop);
    })();

    // ── Particle canvas ────────────────────────────────────────────────────
    const canvas = document.getElementById('bg');
    const ctx    = canvas.getContext('2d');
    let W, H, pts;

    function initParticles() {
      W = canvas.width  = innerWidth;
      H = canvas.height = innerHeight;
      pts = Array.from({ length: 70 }, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.18,
        vy: (Math.random() - 0.5) * 0.18,
        r:  Math.random() * 1.1 + 0.2,
        a:  Math.random() * 0.18 + 0.04,
        depth: Math.random(),
      }));
    }

    window.addEventListener('resize', initParticles);
    initParticles();

    (function particleLoop() {
      ctx.clearRect(0, 0, W, H);

      // subtle dot grid
      ctx.fillStyle = 'rgba(255,255,255,0.025)';
      const gap = 48;
      for (let x = gap / 2; x < W; x += gap)
        for (let y = gap / 2; y < H; y += gap) {
          ctx.beginPath();
          ctx.arc(x, y, 0.7, 0, Math.PI * 2);
          ctx.fill();
        }

      // drifting particles with parallax
      for (const p of pts) {
        p.x = (p.x + p.vx + W) % W;
        p.y = (p.y + p.vy + H) % H;
        const px = p.x + lx * p.depth * 28;
        const py = p.y + ly * p.depth * 28;
        ctx.beginPath();
        ctx.arc(px, py, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${p.a})`;
        ctx.fill();
      }

      requestAnimationFrame(particleLoop);
    })();

    // ── Staggered entrance ─────────────────────────────────────────────────
    document.querySelectorAll('.line').forEach((el, i) => {
      setTimeout(() => el.classList.add('in'), 250 + i * 200);
    });
  </script>
</body>
</html>
